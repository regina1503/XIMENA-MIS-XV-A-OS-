<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis xv años Ximena Eleonor ❤️</title>
    
    <!-- Meta tag para previsualización al compartir -->
    <meta property="og:image" content="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/blob/main/portada%20xime.jpg?raw=true">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; margin: 0; padding: 0; scroll-behavior: smooth; overflow-x: hidden; }
        .page { min-height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .bg-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
        .btn-custom { background-color: #470810; color: white; font-weight: bold; padding: 12px 24px; border-radius: 50px; text-decoration: none; transition: transform 0.2s; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 10; font-size: 1rem; }
        .sello { width: 48px; height: 48px; border: 2px solid #B8860B; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #B8860B; font-weight: bold; cursor: pointer; background: rgba(184, 134, 11, 0.1); backdrop-filter: blur(5px); z-index: 20; transition: transform 0.3s; margin-top: 11%; }
        .circle-timer { width: 53px; height: 53px; background-color: #470810; border-radius: 50%; border: 1px solid #D4AF37; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 0.9rem; margin: 2px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .label { color: #470810; font-weight: bold; font-size: 0.6rem; text-transform: uppercase; margin-top: 5px; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="overlay">
        <img src="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/blob/main/XV%20XIME%20(8).jpg?raw=true" class="bg-image">
        <div id="startBtn" class="sello">ABRIR</div>
    </div>

    <!-- Pág 1 -->
    <section class="page"><img src="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/blob/main/XV%20XIME%20(2).jpg?raw=true" class="bg-image"></section>
    <!-- Pág 2 -->
    <section class="page"><img src="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/blob/main/XV%20XIME%20(1).jpg?raw=true" class="bg-image"></section>
    <!-- Pág 3 -->
    <section class="page"><img src="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/blob/main/XV%20XIME%20(3).jpg?raw=true" class="bg-image"></section>
    <!-- Pág 4 -->
    <section class="page">
        <img src="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/blob/main/XV%20XIME%20(4).jpg?raw=true" class="bg-image">
        <div class="relative z-10 text-center flex flex-col items-center w-full">
            <a href="#" class="btn-custom mt-[44.5vh]">Ver ubicación</a>
        </div>
    </section>

    <!-- Pág 5 -->
    <section class="page"><img src="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/blob/main/XV%20XIME%20(5).jpg?raw=true" class="bg-image"></section>
    
    <!-- Pág 6: Enlace a confirmación externa con nueva imagen -->
    <section class="page">
        <img src="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/blob/main/XV%20XIME%20(9).jpg?raw=true" class="bg-image">
        <div class="relative z-10 text-center flex flex-col items-center w-full">
            <a href="https://regina1503.github.io/xximecon/" target="_blank" class="btn-custom mt-[44.5vh]">CONFIRMAR ASISTENCIA</a>
        </div>
    </section>
    
    <!-- Pág 7 -->
    <section class="page">
        <img src="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/blob/main/XV%20XIME%20(7).jpg?raw=true" class="bg-image">
        <div id="countdown" class="relative z-10 flex flex-wrap justify-center gap-1 mt-[-30vh]">
            <div class="flex flex-col items-center"><div id="days" class="circle-timer">00</div><span class="label">Días</span></div>
            <div class="flex flex-col items-center"><div id="hours" class="circle-timer">00</div><span class="label">Hrs</span></div>
            <div class="flex flex-col items-center"><div id="minutes" class="circle-timer">00</div><span class="label">Min</span></div>
            <div class="flex flex-col items-center"><div id="seconds" class="circle-timer">00</div><span class="label">Seg</span></div>
        </div>
    </section>

    <script>
        document.getElementById("startBtn").onclick = () => document.getElementById("overlay").style.display = 'none';
        
        setInterval(() => {
            const dist = new Date("July 24, 2026 15:00:00").getTime() - new Date().getTime();
            document.getElementById("days").innerText = Math.floor(dist / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById("hours").innerText = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById("minutes").innerText = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById("seconds").innerText = Math.floor((dist % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
