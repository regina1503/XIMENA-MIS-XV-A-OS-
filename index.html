<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis xv años Ximena Eleonor ❤️</title>
    
    <meta property="og:image" content="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/blob/main/portada%20xime.jpg?raw=true">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; margin: 0; padding: 0; scroll-behavior: smooth; overflow-x: hidden; font-family: sans-serif; }
        .page { min-height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .bg-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
        .btn-custom { background-color: #470810; color: white; font-weight: bold; padding: 12px 24px; border-radius: 50px; text-decoration: none; transition: transform 0.2s; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 10; font-size: 0.9rem; }
        .sello { width: 49px; height: 49px; border: 2px solid #B8860B; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #B8860B; font-weight: bold; cursor: pointer; background: rgba(184, 134, 11, 0.2); backdrop-filter: blur(5px); z-index: 20; transition: transform 0.3s; font-size: 0.6rem; margin-top: 25%; }
        .sello:hover { transform: scale(1.1); }
        .circle-timer { width: 55px; height: 55px; background-color: #470810; border-radius: 50%; border: 1px solid #D4AF37; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 0.9rem; margin: 2px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .label { color: #470810; font-weight: bold; font-size: 0.6rem; text-transform: uppercase; margin-top: 5px; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <audio id="musicaFondo" loop>
        <source src="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/raw/main/Taylor%20Swift%20-%20Fifteen.mp3" type="audio/mpeg">
    </audio>

    <div id="overlay">
        <img src="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/blob/main/XV%20XIME%20(8).jpg?raw=true" class="bg-image" alt="Portada">
        <div id="startBtn" class="sello">ABRIR</div>
    </div>

    <section class="page"><img src="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/blob/main/XV%20XIME%20(10).jpg?raw=true" class="bg-image" alt="Invitación"></section>
    <section class="page"><img src="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/blob/main/XV%20XIME%20(12).jpg?raw=true" class="bg-image" alt="Detalles"></section>
    <section class="page"><img src="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/blob/main/XV%20XIME%20(3).jpg?raw=true" class="bg-image" alt="Info"></section>
    
    <section class="page">
        <img src="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/blob/main/XV%20XIME%20(13).jpg?raw=true" class="bg-image" alt="Ubicación">
        <div class="absolute z-10 w-full text-center mt-[0.84vh]">
            <a href="https://www.google.com/maps/place/Rector%C3%ADa+de+la+Sagrada+Familia/@19.2879626,-99.6478656,899m/data=!3m1!1e3!4m6!3m5!1s0x85cd898d3d3ae6d1:0x8e3bdd0366914147!8m2!3d19.2879623!4d-99.6432509!16s%2Fg%2F1tdnflf3?hl=es&entry=ttu&g_ep=EgoyMDI2MDYyMi4wIKXMDSoASAFQAw%3D%3D" target="_blank" class="btn-custom">Ver mapa</a>
        </div>
        <div class="absolute z-10 w-full text-center mt-[85vh]">
            <a href="https://www.google.com/maps/place/Loto+Events,+Cam.+Viejo+a+Capultitlan+577,+San+Felipe+Tlalmimilolpan,+50253+San+Felipe+Tlalmimilolpan,+M%C3%A9x./data=!4m2!3m1!1s0x85cd890ad35505e9:0x4b7acbb4e7cdfc3!18m1!1e1?entry=gps&coh=192189&g_ep=CAESBzI2LjIzLjMYACCenQoqgQEsOTQyNjc3MjcsOTQyOTIxOTUsOTQyOTk1MzIsMTAwNzk2NDk4LDEwMDc5Nzc2MSwxMDA3OTY1MzUsOTQyODA1NzYsOTQyMDczOTQsOTQyMDc1MDYsOTQyMDg1MDYsOTQyMTg2NTMsOTQyMjk4MzksOTQyNzUxNjgsOTQyNzk2MTlCAk1Y&skid=23156a10-5ca0-49af-aa80-2394f8474fc0&g_st=aw" target="_blank" class="btn-custom">Ver ubicación</a>
        </div>
    </section>

    <section class="page">
        <img src="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/blob/main/XV%20XIME%20(15).jpg?raw=true" class="bg-image" alt="Información extra">
        <div class="absolute z-10 w-full h-full flex items-center justify-center">
            <a href="https://www.wishbob.com/ljegcmbfip" target="_blank" class="btn-custom mt-[5vh]">VER MESA DE REGALOS</a>
        </div>
    </section>

    <section class="page"><img src="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/blob/main/XV%20XIME%20(14).jpg?raw=true" class="bg-image" alt="Extra"></section>
    
    <section class="page">
        <img src="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/blob/main/XV%20XIME%20(9).jpg?raw=true" class="bg-image" alt="Confirmación">
        <div class="relative z-10 text-center flex flex-col items-center w-full mt-[49.5vh]">
            <a href="https://regina1503.github.io/xximecon/" target="_blank" class="btn-custom">CONFIRMAR ASISTENCIA</a>
        </div>
    </section>
    
    <section class="page">
        <img src="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/blob/main/XV%20XIME%20(7).jpg?raw=true" class="bg-image" alt="Cuenta regresiva">
        <div id="countdown" class="relative z-10 flex flex-wrap justify-center gap-2 mt-[-30vh]">
            <div class="flex flex-col items-center"><div id="days" class="circle-timer">00</div><span class="label">Días</span></div>
            <div class="flex flex-col items-center"><div id="hours" class="circle-timer">00</div><span class="label">Hrs</span></div>
            <div class="flex flex-col items-center"><div id="minutes" class="circle-timer">00</div><span class="label">Min</span></div>
            <div class="flex flex-col items-center"><div id="seconds" class="circle-timer">00</div><span class="label">Seg</span></div>
        </div>
    </section>

    <script>
        document.getElementById("startBtn").onclick = () => {
            document.getElementById("overlay").style.display = 'none';
            const audio = document.getElementById("musicaFondo");
            audio.play().catch(e => console.log("Audio play failed, user interaction required."));
        };
        
        function updateTimer() {
            const eventDate = new Date("July 24, 2026 15:00:00").getTime();
            const now = new Date().getTime();
            const dist = eventDate - now;

            if (dist < 0) return;

            document.getElementById("days").innerText = Math.floor(dist / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById("hours").innerText = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById("minutes").innerText = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById("seconds").innerText = Math.floor((dist % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }
        
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
