<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XV Años Ximena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; margin: 0; padding: 0; scroll-behavior: smooth; overflow-x: hidden; }
        .page { min-height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .bg-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
        
        #petals-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
        .petal {
            position: absolute; width: 4px; height: 4px; background: rgba(212, 175, 55, 0.5); 
            border-radius: 50%; opacity: 0; animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) translateX(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(110vh) translateX(10px); opacity: 0; }
        }

        .btn-custom { background-color: #470810; color: white; font-weight: bold; padding: 10px 20px; border-radius: 50px; text-decoration: none; transition: transform 0.2s; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 10; font-size: 0.9rem; }
        .btn-custom:hover { transform: scale(1.05); background-color: #600b16; }
        
        .sello { 
            width: 48px; height: 48px; border: 2px solid #B8860B; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; color: #B8860B; font-weight: bold; 
            cursor: pointer; background: rgba(184, 134, 11, 0.1); backdrop-filter: blur(5px);
            z-index: 20; transition: transform 0.3s; box-shadow: 0 0 10px rgba(184, 134, 11, 0.3); 
            text-align: center; padding: 2px; font-size: 0.5rem; line-height: 1;
            margin-top: 11%;
        }
        .sello:hover { transform: scale(1.1); }

        .texto-instruccion { color: #470810; margin-bottom: 8px; font-weight: bold; z-index: 20; font-size: 0.7rem; text-align: center; }

        .circle-timer { 
            width: 53px; height: 53px; background-color: #470810; border-radius: 50%; border: 1px solid #D4AF37; 
            display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; 
            font-size: 0.9rem; margin: 2px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
        }
        .label { color: #470810; font-weight: bold; font-size: 0.6rem; text-transform: uppercase; margin-top: 5px; }
        
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        #adminPanel { transition: all 0.3s ease; }
    </style>
</head>
<body>
    <div id="petals-container"></div>

    <div id="overlay">
        <img src="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/blob/main/XV%20XIME%20(8).jpg?raw=true" class="bg-image">
        <div class="texto-instruccion">DA CLIC PARA<br>ABRIR LA INVITACIÓN</div>
        <div id="startBtn" class="sello">ABRIR</div>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/blob/main/Taylor%20Swift%20-%20Fifteen.mp3?raw=true" type="audio/mpeg">
    </audio>

    <section class="page"><img src="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/blob/main/XV%20XIME%20(2).jpg?raw=true" class="bg-image"></section>
    <section class="page"><img src="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/blob/main/XV%20XIME%20(1).jpg?raw=true" class="bg-image"></section>
    <section class="page"><img src="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/blob/main/XV%20XIME%20(3).jpg?raw=true" class="bg-image"></section>
    
    <section class="page">
        <img src="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/blob/main/XV%20XIME%20(4).jpg?raw=true" class="bg-image">
        <div class="relative z-10 text-center flex flex-col items-center w-full">
            <a href="https://www.google.com/maps/place/Loto+Events/@19.2498461,-99.6457375,899m/data=!3m2!1e3!4b1!4m6!3m5!1s0x85cd890ad35505e9:0x4b7acbb4e7cdfc3!8m2!1d19.2498461!2d-99.6457375!16s%2Fg%2F11tx1pb0zp!18m1!1e1?entry=ttu&g_ep=EgoyMDI2MDYxNi4wIKXMDSoASAFQAw%3D%3D" class="btn-custom mt-[44.5vh]">Ver ubicación</a>
            <a href="https://www.google.com/maps/place/Loto+Events/@19.2498461,-99.6457375,899m/data=!3m2!1e3!4b1!4m6!3m5!1s0x85cd890ad35505e9:0x4b7acbb4e7cdfc3!8m2!1d19.2498461!2d-99.6457375!16s%2Fg%2F11tx1pb0zp!18m1!1e1?entry=ttu&g_ep=EgoyMDI2MDYxNi4wIKXMDSoASAFQAw%3D%3D" class="btn-custom mt-[41vh]">Ver ubicación</a>
        </div>
    </section>

    <section class="page"><img src="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/blob/main/XV%20XIME%20(5).jpg?raw=true" class="bg-image"></section>
    
    <section class="page">
        <img src="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/blob/main/XV%20XIME%20(6).jpg?raw=true" class="bg-image">
        <div class="relative z-10 w-full max-w-sm px-6">
            <div class="bg-white/90 p-6 rounded-2xl shadow-xl border border-gold-300">
                <h3 class="text-xl font-bold text-[#470810] mb-4 text-center">Confirmación de Pases</h3>
                <input type="text" id="guestSearch" placeholder="Escribe tu nombre..." class="w-full p-2 border border-gray-300 rounded-lg text-sm mb-2">
                <div id="searchResults" class="max-h-40 overflow-y-auto mb-4 hidden bg-white border border-gray-200 rounded-lg shadow-sm"></div>
                
                <div id="confirmationView" class="hidden text-center">
                    <p id="guestMsg" class="text-[#470810] mb-3 text-sm font-semibold"></p>
                    <select id="passCount" class="w-full p-2 border border-[#470810] rounded-lg mb-4"></select>
                    <button onclick="confirmAction()" class="bg-[#470810] text-white w-full py-2 rounded-lg font-bold text-sm">Confirmar asistencia</button>
                </div>
                <div id="successMsg" class="hidden text-green-700 font-bold text-center mt-2">¡Asistencia confirmada!</div>
            </div>
        </div>
    </section>

    <section class="page">
        <img src="https://github.com/regina1503/XIMENA-MIS-XV-A-OS-/blob/main/XV%20XIME%20(7).jpg?raw=true" class="bg-image">
        <div id="countdown" class="relative z-10 flex flex-wrap justify-center gap-1 mt-[-30vh]">
            <div class="flex flex-col items-center"><div id="days" class="circle-timer">00</div><span class="label">Días</span></div>
            <div class="flex flex-col items-center"><div id="hours" class="circle-timer">00</div><span class="label">Hrs</span></div>
            <div class="flex flex-col items-center"><div id="minutes" class="circle-timer">00</div><span class="label">Min</span></div>
            <div class="flex flex-col items-center"><div id="seconds" class="circle-timer">00</div><span class="label">Seg</span></div>
        </div>
    </section>

    <div id="adminPanel" class="hidden fixed bottom-10 right-10 z-[200] bg-white p-4 rounded-xl shadow-2xl border-2 border-[#470810] w-64">
        <h4 class="font-bold text-[#470810] mb-2 text-center text-sm">Invitados Confirmados</h4>
        <div id="confirmedList" class="text-xs text-gray-700 max-h-48 overflow-y-auto"></div>
    </div>
    <div class="fixed bottom-2 left-2 z-[200] cursor-pointer text-gray-500 hover:text-[#470810]" onclick="document.getElementById('adminPanel').classList.toggle('hidden')">
        ⚙️
    </div>

    <script>
        const guests = [
            { name: "Regina Contreras", passes: 3 },
            { name: "Mario", passes: 2 },
            { name: "Sarai", passes: 4 },
            { name: "Luna", passes: 1 }
        ];

        let selectedGuest = null;
        const confirmedGuests = [];

        const input = document.getElementById('guestSearch');
        const resultsDiv = document.getElementById('searchResults');
        const confirmationView = document.getElementById('confirmationView');
        const guestMsg = document.getElementById('guestMsg');
        const passCountSelect = document.getElementById('passCount');

        input.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            resultsDiv.innerHTML = '';
            
            if (query.length >= 4) {
                const matches = guests.filter(g => g.name.toLowerCase().includes(query));
                if (matches.length > 0) {
                    resultsDiv.classList.remove('hidden');
                    matches.forEach(g => {
                        const div = document.createElement('div');
                        div.className = 'p-2 border-b cursor-pointer hover:bg-gray-100 text-sm';
                        div.innerText = g.name;
                        div.onclick = () => selectGuest(g);
                        resultsDiv.appendChild(div);
                    });
                } else {
                    resultsDiv.classList.add('hidden');
                }
            } else {
                resultsDiv.classList.add('hidden');
            }
        });

        function selectGuest(guest) {
            selectedGuest = guest;
            input.value = guest.name;
            resultsDiv.classList.add('hidden');
            confirmationView.classList.remove('hidden');
            guestMsg.innerText = `Hola ${guest.name}, tienes ${guest.passes} pases disponibles.`;
            
            passCountSelect.innerHTML = '';
            for(let i=1; i<=guest.passes; i++) {
                const opt = document.createElement('option');
                opt.value = i;
                opt.innerText = i + (i === 1 ? ' pase' : ' pases');
                passCountSelect.appendChild(opt);
            }
        }

        function confirmAction() {
            const numPases = parseInt(passCountSelect.value);
            confirmedGuests.push({ name: selectedGuest.name, passes: numPases });
            
            confirmationView.classList.add('hidden');
            document.getElementById('successMsg').classList.remove('hidden');
            input.disabled = true;
            
            updateAdminPanel();
        }

        function updateAdminPanel() {
            const list = document.getElementById('confirmedList');
            list.innerHTML = confirmedGuests.map(g => `<div class="mb-1 border-b pb-1"><strong>${g.name}</strong>: ${g.passes} pases</div>`).join('');
        }

        function createPetal() {
            const petal = document.createElement('div');
            petal.className = 'petal';
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animationDuration = Math.random() * 8 + 10 + 's';
            petal.style.width = Math.random() * 3 + 2 + 'px';
            petal.style.height = petal.style.width;
            document.getElementById('petals-container').appendChild(petal);
            setTimeout(() => petal.remove(), 20000);
        }
        setInterval(createPetal, 1200);

        const audio = document.getElementById("bgMusic");
        document.getElementById("startBtn").onclick = () => {
            audio.currentTime = 10;
            audio.play();
            document.getElementById("overlay").style.display = 'none';
        };
        const targetDate = new Date("July 24, 2026 15:00:00").getTime();
        function updateTimer() {
            const now = new Date().getTime();
            const distance = targetDate - now;
            document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById("seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
